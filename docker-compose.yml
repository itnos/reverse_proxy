
services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_webserver
    # Перед запуском nginx гарантируем что все папки per-site логов существуют
    # (иначе nginx падает с "open() ... failed (2: No such file or directory)")
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /var/log/nginx/sites
        grep -hE 'access_log[[:space:]]+/var/log/nginx/sites/' /etc/nginx/conf.d/*.conf 2>/dev/null \
          | sed -E 's|.*access_log[[:space:]]+/var/log/nginx/sites/([^/]+)/.*|\1|' \
          | sort -u \
          | while read d; do [ -n "$$d" ] && mkdir -p "/var/log/nginx/sites/$$d"; done
        exec /docker-entrypoint.sh nginx -g 'daemon off;'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Файлы сайта
      - ./website:/var/www/html
      - ./acme:/acme
      # Общая папка для ACME валидации
      - ./acme-webroot:/var/www/acme-webroot
      # Конфигурационные файлы Nginx
      - ./configs/nginx/sites:/etc/nginx/conf.d/:ro
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Логи выводим наружу
#      - ./logs/nginx:/var/log/nginx
      - /var/log/nginx:/var/log/nginx
#    depends_on:
#      - php-fpm
    networks:
      - web_network
    restart: unless-stopped


  webadmin-app:
    container_name: webadmin-app
    image: node:20.18-alpine

    working_dir: /app
#    command: sh -c "npm install && npm start"
    command: sh -c "apk add --no-cache docker-cli && npm install -g npm@latest && npm install && npm start"
    ports:
      - "8881:8881"
    volumes:
      # Монтируем всю папку webadmin в /app контейнера
      - ./webadmin:/app
      - ./acme:/acme.sh # доступ к сертификатам
      - node_modules:/app/node_modules  # анонимный volume, скрывает node_modules
      - ./data:/data
      - ./configs/nginx/sites:/nginx_config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - web_network



  acme-sh:
    image: neilpang/acme.sh
    container_name: acme_sh
    volumes:
      - ./acme:/acme.sh
      - ./acme-webroot:/var/www/acme-webroot
    network_mode: host
    command: daemon
    stdin_open: true
    tty: true
    restart: unless-stopped


  logrotate:
    image: alpine:3.19
    container_name: nginx_logrotate
    command: sh -c "apk add --no-cache logrotate && crond -f -l 2"
    volumes:
      - /var/log/nginx:/var/log/nginx
      - ./configs/logrotate/nginx:/etc/logrotate.d/nginx:ro
      - ./configs/logrotate/crontab:/etc/crontabs/root:ro
    restart: unless-stopped
    networks:
      - web_network



networks:
  web_network:
    driver: bridge
  db_network:
    driver: bridge

volumes:
  node_modules:

