
services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_webserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Файлы сайта
      - ./website:/var/www/html
      - ./acme:/acme
      # Общая папка для ACME валидации
      - ./acme-webroot:/var/www/acme-webroot
      # Конфигурационные файлы Nginx
      - ./configs/nginx/sites:/etc/nginx/conf.d/:ro
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Логи выводим наружу
#      - ./logs/nginx:/var/log/nginx
      - /var/log/nginx:/var/log/nginx
#    depends_on:
#      - php-fpm
    networks:
      - web_network
    restart: unless-stopped


  webadmin-app:
    container_name: webadmin-app
    image: node:20.18-alpine

    working_dir: /app
#    command: sh -c "npm install && npm start"
    command: sh -c "apk add --no-cache docker-cli && npm install -g npm@latest && npm install && npm start"
    ports:
      - "8881:8881"
    volumes:
      # Монтируем всю папку webadmin в /app контейнера
      - ./webadmin:/app
      - ./acme:/acme.sh # доступ к сертификатам
      - node_modules:/app/node_modules  # анонимный volume, скрывает node_modules
      - ./data:/data
      - ./configs/nginx/sites:/nginx_config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - web_network



  acme-sh:
    image: neilpang/acme.sh
    container_name: acme_sh
    volumes:
      - ./acme:/acme.sh
      - ./acme-webroot:/var/www/acme-webroot
    network_mode: host
    command: daemon
    stdin_open: true
    tty: true
    restart: unless-stopped



networks:
  web_network:
    driver: bridge
  db_network:
    driver: bridge

volumes:
  node_modules:

